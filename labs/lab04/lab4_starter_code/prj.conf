# SafePulse Lab 4 - Zephyr Project Configuration
# Target: STM32F4 on Renode

# Core kernel features
CONFIG_MULTITHREADING=y
CONFIG_NUM_PREEMPT_PRIORITIES=16
CONFIG_MAIN_STACK_SIZE=2048

# Timer and scheduling
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_TIMESLICING=n

# Kernel objects we need
CONFIG_POLL=y

# UART / Console
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# GPIO
CONFIG_GPIO=y

# Logging (optional, useful for debugging)
CONFIG_LOG=n

# Stack overflow detection (helpful for students)
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_NAME=y
